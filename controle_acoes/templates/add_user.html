{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width:480px; margin:0 auto;">
    <div style="padding:1rem 1rem .5rem;">
        <h3>{% if edit %}Editar Usuário{% else %}Novo Usuário{% endif %}</h3>
    </div>
    <div style="padding:.5rem 1rem 1.5rem;">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Login</label>
                <input type="text" name="username" class="form-control"
                    value="{{ user.username if user else '' }}"
                    {% if edit %}readonly{% endif %} required
                    placeholder="Nome de login (sem espaços)">
            </div>
            <div class="mb-3">
                <label class="form-label">Nome Completo</label>
                <input type="text" name="full_name" class="form-control"
                    value="{{ user.full_name if user and user.full_name else '' }}"
                    placeholder="Nome completo do usuário">
            </div>
            <div class="mb-3">
                <label class="form-label">E-mail</label>
                <input type="email" name="email" class="form-control"
                    value="{{ user.email if user and user.email else '' }}"
                    placeholder="email@exemplo.com">
            </div>
            <div class="mb-3">
                <label class="form-label">Senha {% if edit %}<small style="color:var(--text-secondary);">(deixe em branco para manter)</small>{% endif %}</label>
                <input type="password" name="password" class="form-control"
                    {% if not edit %}required{% endif %}
                    placeholder="{% if edit %}Nova senha (opcional){% else %}Senha{% endif %}">
            </div>
            <div class="mb-3">
                <label class="form-label">Nível de Acesso</label>
                <select name="role" class="form-control">
                    <option value="user" {% if user and user.role=='user' %}selected{% endif %}>Usuário Comum</option>
                    <option value="admin" {% if user and user.role=='admin' %}selected{% endif %}>Administrador</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Validade do Acesso</label>
                <input type="date" name="expiry_date" class="form-control"
                    value="{{ user.expiry_date if user and user.expiry_date else '' }}">
                <small style="color:var(--text-secondary); font-size:.8rem;">Deixe em branco para acesso ilimitado.</small>
            </div>
            <div style="display:flex; gap:.5rem; flex-wrap:wrap;">
                <button type="submit" class="btn btn-primary" style="flex:1;">💾 Salvar</button>
                <a href="{{ url_for('list_users') }}" class="btn btn-secondary" style="flex:1;">✖ Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
